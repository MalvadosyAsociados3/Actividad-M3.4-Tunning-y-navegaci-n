# =============================================================================
#  nav2_params.yaml  —  Puzzlebot Nav2 tuning (Actividad M3.4)
# -----------------------------------------------------------------------------
#  Robot real (escalado al 70%):
#    - Footprint:     12.6 cm  x  10.5 cm
#    - Diagonal:      16.4 cm   ->  radio de giro: ~8.2 cm
#    - Altura chasis: 5 cm
#    - Separacion de ruedas: 13.3 cm
#    - Max vel lineal: 0.12 m/s   |   Max vel angular: 0.8 rad/s
#    - LiDAR 360 a z=8 cm, rango 0.08-5.0 m, 10 Hz
#
#  Mapa:
#    - resolucion: 0.05 m/px
#    - entorno: laberinto interior con pasillos de ~30 cm
#
#  Cada bloque tiene comentarios explicando el motivo del valor elegido.
# =============================================================================


# ============================================================================
#  AMCL  —  Localizacion probabilistica
# ============================================================================
#  SINTOMA observado: nube de particulas no convergia rapido tras fijar pose
#                     inicial; AMCL "saltaba" tras colisiones.
#  CAUSA: parametros pensados para un robot real con ruido de odometria alto.
#         En simulacion Gazebo la odometria del diff-drive es casi perfecta.
#  AJUSTE: se reducen alpha1-4 (ruido esperado de odom) y se habilita recovery
#          lento para recuperarse si el robot se desalinea (colision).
# ============================================================================
amcl:
  ros__parameters:
    use_sim_time: True

    # Frames
    base_frame_id: base_footprint
    odom_frame_id: odom
    global_frame_id: map
    scan_topic: scan
    tf_broadcast: true
    transform_tolerance: 0.5   # menor que antes (1.0) para sincronia mas estricta

    # Ruido del modelo de movimiento (robot diferencial).
    # alpha1: ruido de rotacion por rotacion
    # alpha2: ruido de rotacion por traslacion
    # alpha3: ruido de traslacion por traslacion
    # alpha4: ruido de traslacion por rotacion
    # En simulacion la odometria es casi perfecta -> bajamos de 0.2 a 0.1
    alpha1: 0.1
    alpha2: 0.1
    alpha3: 0.1
    alpha4: 0.1
    alpha5: 0.1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"

    # Particulas: bajamos max de 2000 a 1500 para ahorrar CPU sin perder
    # precision. min de 500 a 300 cuando hay buena convergencia.
    max_particles: 1500
    min_particles: 300
    pf_err: 0.05
    pf_z: 0.99
    resample_interval: 1

    # Umbrales de actualizacion: el robot escalado (70%) se mueve menos por
    # tick, asi que bajamos update_min_d de 0.25 a 0.15 para que AMCL
    # actualice mas a menudo y no deje que la pose se desincronice.
    update_min_d: 0.15
    update_min_a: 0.15

    # Modelo del sensor laser
    laser_model_type: "likelihood_field"
    laser_likelihood_max_dist: 2.0
    laser_max_range: 5.0         # antes 100.0: acotamos al rango real del LiDAR (5 m)
    laser_min_range: 0.08        # antes -1.0: coincide con min_range del sensor
    max_beams: 60                # con 360 samples esto hace submuestreo 1/6

    sigma_hit: 0.2
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    lambda_short: 0.1

    # Beam skip (omite lecturas incongruentes, util en entornos dinamicos)
    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3

    # Recovery behaviors: permiten reinicializar si el PF diverge.
    # recovery_alpha_slow=0.001 -> filtro lento para detectar divergencia
    # recovery_alpha_fast=0.1   -> filtro rapido, genera particulas aleatorias
    # Antes: 0.0/0.0 (desactivado)
    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1

    save_pose_rate: 0.5

amcl_map_client:
  ros__parameters:
    use_sim_time: True

amcl_rclcpp_node:
  ros__parameters:
    use_sim_time: True


# ============================================================================
#  BT NAVIGATOR  —  Arbol de comportamiento que orquesta Nav2
# ============================================================================
bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    default_bt_xml_filename: navigate_w_replanning_and_recovery.xml
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node

bt_navigator_rclcpp_node:
  ros__parameters:
    use_sim_time: True


# ============================================================================
#  CONTROLLER SERVER  (Regulated Pure Pursuit)
# ----------------------------------------------------------------------------
#  SINTOMA: con DWB el robot hacia arcos amplios y chocaba en curvas de 90
#           grados del laberinto.
#  CAUSA:   DWB prioriza trayectorias tipo Ackermann (avance + giro simultaneo),
#           no optimo para diff-drive en pasillos estrechos.
#  AJUSTE:  se migro a Regulated Pure Pursuit con rotacion en sitio activada
#           (use_rotate_to_heading). En curvas cerradas el robot se detiene,
#           gira hacia el siguiente punto del path y avanza recto.
# ============================================================================
controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0     # Hz, suficiente para robot lento (0.12 m/s)
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    # --- Progress checker -------------------------------------------------
    # required_movement_radius ajustado a 0.2 m (antes 0.5 m) porque en el
    # laberinto estrecho el robot a veces no recorre 0.5 m en linea recta.
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.2
      movement_time_allowance: 10.0

    # --- Goal checker -----------------------------------------------------
    # Tolerancias reducidas respecto al valor por defecto (0.25) para que
    # el robot pequeño (12.6 cm) se detenga mas cerca del objetivo.
    # xy=0.15 m (~11 cm) | yaw=0.20 rad (~11 grados)
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.20

    # --- Regulated Pure Pursuit -------------------------------------------
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      # Velocidades: ajustadas al robot real (70% tamaño original)
      desired_linear_vel: 0.12           # m/s - seguro en pasillos estrechos
      max_angular_accel: 1.5             # rad/s^2
      rotate_to_heading_angular_vel: 0.6 # rad/s al girar en sitio

      # Lookahead: cuan lejos en el path mira el controller.
      # Para robot chico conviene mirar menos adelante (no salirse del pasillo
      # al anticipar curvas). Antes era 0.3/0.2/0.4, ahora 0.25/0.2/0.35.
      lookahead_dist: 0.25
      min_lookahead_dist: 0.2
      max_lookahead_dist: 0.35
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: false

      # Aproximacion al goal: frena gradualmente los ultimos 0.5 m antes
      # del objetivo para no pasarse de largo.
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.5

      # Deteccion de colision: mira el carrot (lookahead) y para si detecta
      # colision antes de que se cumpla el tiempo.
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.5

      # Regulacion de velocidad en curvas cerradas (radio pequeño).
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.6   # m - bajar a mas curva
      regulated_linear_scaling_min_speed: 0.05   # m/s - vel minima en curva

      # Regulacion por cost (proximidad a obstaculos): frena al acercarse
      # a paredes segun el costmap inflado.
      use_cost_regulated_linear_velocity_scaling: true

      use_fixed_curvature_lookahead: false
      curvature_lookahead_dist: 0.25

      # Rotate to heading: detener-girar-avanzar en curvas >= 0.5 rad (~28 deg)
      # Critico para diff-drive en laberinto.
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.5

      allow_reversing: false
      max_robot_pose_search_dist: 10.0
      transform_tolerance: 0.3

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: True


# ============================================================================
#  LOCAL COSTMAP  —  mapa de costos dinamico (rolling window alrededor del robot)
# ----------------------------------------------------------------------------
#  SINTOMA: Nav2 se negaba a planear por algunos pasillos (todo quedaba morado
#           en RViz)
#  CAUSA:   inflation_radius muy alto (0.35 m) cubria todo el ancho del pasillo
#  AJUSTE:  inflation_radius = 0.15 m y cost_scaling_factor = 5.0. El costo
#           decae mas rapido al alejarse de la pared, dejando carril libre.
#  SINTOMA: costmap local no alcanzaba a ver obstaculos antes de la curva.
#  AJUSTE:  width/height = 3 m sigue siendo suficiente a 0.12 m/s, pero
#           subimos update_frequency de 5 a 10 Hz para reaccion mas rapida.
# ============================================================================
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: True
      update_frequency: 10.0       # antes 5.0 - mas reactivo ante obstaculos
      publish_frequency: 5.0       # antes 2.0 - RViz se actualiza mas rapido
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05            # coincide con resolucion del mapa
      footprint: "[[0.11, 0.1], [0.11, -0.1], [-0.11, -0.1], [-0.11, 0.01]]"  # poligono rectangular de 22 cm x 20 cm (con margen)
      plugins: ["voxel_layer", "inflation_layer"]

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0   # mayor = decae mas rapido
        inflation_radius: 0.12     # margen de seguridad desde paredes

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

      static_layer:
        map_subscribe_transient_local: True
      always_send_full_costmap: True
  local_costmap_client:
    ros__parameters:
      use_sim_time: True
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True


# ============================================================================
#  GLOBAL COSTMAP  —  mapa de costos estatico completo
# ============================================================================
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: True
      update_frequency: 1.0        # estatico, no necesita frecuencia alta
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      footprint: "[[0.11, 0.1], [0.11, -0.1], [-0.11, -0.1], [-0.11, 0.01]]"  # mismo footprint que local
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.15

      always_send_full_costmap: True
  global_costmap_client:
    ros__parameters:
      use_sim_time: True
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True


# ============================================================================
#  MAP SERVER / SAVER
# ============================================================================
map_server:
  ros__parameters:
    use_sim_time: True
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: True
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True


# ============================================================================
#  PLANNER SERVER  —  planner global A*
# ----------------------------------------------------------------------------
#  AJUSTE: tolerancia bajada de 0.5 a 0.25 para que el planner se esfuerce
#          en llegar mas cerca del goal (el laberinto tiene celdas de ~30 cm;
#          0.5 m era "el pasillo de al lado").
# ============================================================================
planner_server:
  ros__parameters:
    use_sim_time: True
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.25
      use_astar: true
      allow_unknown: false

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: True


# ============================================================================
#  RECOVERIES SERVER  —  comportamientos de recuperacion
# ----------------------------------------------------------------------------
#  AJUSTE: max_rotational_vel y rotational_acc_lim bajados a 0.8 / 2.0 para
#          que los spins de recuperacion sean suaves y no tiren al robot.
# ============================================================================
recoveries_server:
  ros__parameters:
    use_sim_time: True
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    recovery_plugins: ["spin", "back_up", "wait"]
    spin:
      plugin: "nav2_recoveries/Spin"
    back_up:
      plugin: "nav2_recoveries/BackUp"
    wait:
      plugin: "nav2_recoveries/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_timeout: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.8       # antes 1.0 - consistente con RPP
    min_rotational_vel: 0.3       # antes 0.4
    rotational_acc_lim: 2.0       # antes 3.2 - evita saltos


robot_state_publisher:
  ros__parameters:
    use_sim_time: True


# ============================================================================
#  WAYPOINT FOLLOWER  —  secuencia de goals (usado por go_and_return.py)
# ============================================================================
waypoint_follower:
  ros__parameters:
    use_sim_time: True
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 2000   # 2 s de espera en cada waypoint
